packages:
  - packages/*
  - apps/*

allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  prisma-zod-generator: true

catalogs:
  prisma:
    prisma: latest

ignoredBuiltDependencies:
  - prisma-zod-generator

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma
  - unrs-resolver

overrides:
  hono@<4.11.4: '>=4.11.4'
  hono@<4.11.7: '>=4.11.7'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
